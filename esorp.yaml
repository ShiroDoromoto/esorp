# esorp.yaml — esorp 自身の設定。
# ここに書かれているものが、動いているものの全部。隠れた既定は無い。

syntax:
  cstyle:
    files:
      - "**/*.go"
      - "**/*.rs"
      - "**/*.ts"
      - "**/*.tsx"
    mode: structural

    # 許可する「器」。ここに列挙されていない器のコメントは、中身が何であれ違反。
    allow:
      - place: header               # ファイル冒頭（ライセンス等）

      - place: doc                  # 宣言に紐づく説明
        # 器の中の「書式」。形だけを見る。語彙は見ない。
        form:
          subject: required         # 1行目が、紐づく宣言の名前で始まること（Go の doc 規約）
          headings: deny            # 見出しを書けない（履歴は見出しを付けて書かれる）
          paragraphs: 1             # 段落は1つ（背景を段落として付け足せない）

      - place: trailing             # 行末。ラベル必須
        label: ["SAFETY:", "TODO:", "nolint:"]

      # place: leading  — 許可しない（文の直前の自由コメント）
      # place: orphan   — 許可しない（どこにも紐づかない浮いたコメント）

  # 器の概念が無いファイル。コメントは「#」1種類しかなく、doc も紐づく宣言も無い。器の集合の
  # 要素が1個なので、「許可するものを列挙して残りを落とす」が選択の軸として働かない。層2 だけを当てる。
  hash:
    files:
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.sh"
      - "**/.gitignore"
      - "**/Makefile"
    mode: content-only

  sgml:
    files:
      - "**/*.md"
    mode: content-only

# 違反時に提示する始末のしかた。既定は削除（履歴はバージョン管理が持っている）。
# 残す価値のある判断だけ、行き先を文字列で指定できる。ツールは行き先を規定しない。
disposition:
  place-not-allowed: |
    この位置のコメントは許可されていません。
    目の前のコードの説明なら、宣言に紐づく doc コメントに移してください。
    変更の履歴なら、バージョン管理が保持しているので削除してください。
  label-required: |
    この位置のコメントにはラベルが必要です。
  form-subject: |
    doc コメントは、その宣言の説明です。宣言の名前で始めてください。
    名前で始められない内容なら、それは宣言の説明ではありません。
  form-headings: |
    doc コメントに見出しは書けません。
  form-paragraphs: |
    doc コメントの段落は1つです。付け足された段落は、多くの場合、目の前のコードの説明ではありません。

# git が「自分のコードではない」と宣言しているものを、esorp も自分のコードとして扱わない。
# gitignore を黙って見にいくのは設定に見えない挙動になるので、方針としてここに書く。
respect_gitignore: true

# 層2（語彙）。ツールは既定を持たない（文字列マッチは必ず誤検知する）。以下は esorp という
# 一プロジェクトの選択であって、他のプロジェクトへの既定ではない。
#
# 足すのは「変化を指す専用句」だけに絞る。4つのコーパス（Go 標準ライブラリ 248,920 コメント、
# 日本語のプロジェクト2件 8,209、英語のプロジェクト1件 1,335）で測ったところ:
#
#   - 「時間や新旧を指す汎用語」（old / before / legacy / 旧 / previously / deprecated）は
#     ほぼ全部が偽陽性だった。deprecated に至っては、その 78% が API の現在の状態を告げる
#     マーカーで、履歴ではない
#   - 専用句でも、言い方が広すぎれば同じことが起きる。英語の "used to" は 93% が「〜するために
#     使われる」という目的の用法で、主語を前に置いて初めて履歴だけを指す。"no longer" は
#     「今そうでない状態」の記述が支配的で、安い正規表現では救えないので持たない
#   - 「以前」も素で当てると半分以上が偽陽性（「v2 以前の形式」＝互換の境界）。係助詞「は」を伴い、
#     かつ直前が文頭・句読点・空白のときだけが履歴を指した（「それ以前」のような時間比較が落ちる）
#
# 誤検知するガードは例外指定を誘発し、やがてツールごと無視される。稀なら足さない方がまし。
rules:
  - id: no-history
    pattern: '(?i)(we|it|this|that|they|these|those|which|there)\s+used\s+to|かつて|従来は|(^|[\s。、（(「『:：・])以前は'
    message: |
      変化を語っています。今のコードが何であるかだけを書いてください。
      「以前はこうだった」はバージョン管理が保持しています。
    where:
      # text は check --text - に渡された本文の面。コメントから追い出した履歴が、コミットメッセージ
      # へ移るのを止める（.githooks/commit-msg が流し込む）。
      syntax: [cstyle, hash, sgml, text]

  # 追跡番号（タスク・決定記録）への参照。ツールは参照の形を知らないので、ここに書いた形が全部。
  # これは esorp が amenbo で採番している、という一プロジェクトの事情であって、既定ではない。
  - id: internal-ref
    pattern: '#\d+|\b[TD]-\d+\b'
    message: |
      追跡番号への参照です。読み手（将来の参加者・外部の読者・次のエージェント）は追跡システムを
      辿れません。番号ではなく、コードだけで読める形で書いてください。
    where:
      # no-history と違って text を外している。コミットメッセージの Task trailer は、コードから
      # 追い出した参照の正しい行き先なので、そこまで追いかけて塞ぐと行き場が無くなる。
      syntax: [cstyle, hash, sgml]

# 層3（意味）。esorp は判定しない。層1・層2 を通り抜けたコメントを、変更分（check --diff）に絞って
# JSON で渡し、この問いを添えるだけ。答えるのは esorp を走らせているエージェント自身。CI の赤/緑は
# これでは変わらない（判定は非決定的なので、そこに CI を賭けない）。
review:
  question: |
    このコメントは、目の前のコードの説明ですか。それとも、事情・履歴・作業メモですか。
    後者なら削除してください（履歴はバージョン管理が保持しています）。
