name: Release

# 引き金は人間が引く。タグ（v*）を push したときだけ走る。merge では何も出荷しない。
# workflow_dispatch は、同じタグを指して焼き直すための逃げ道。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# 来歴（build provenance）は wharfy が焼く。GitHub Actions が渡す OIDC の身元で署名するので、
# 登録する秘密は無い。この2つが無いと wharfy は attest_unavailable の警告どまりで通ってしまい、
# 来歴の無い成果物が黙って出ていく。
permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # wharfy は git のタグから版を決める。浅いクローンではタグが来ない。
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # wharfy build は内部で goreleaser を呼ぶ。PATH に無いと builder_unavailable で落ちる。
      # メジャーを固定する。v3 が出たときに黙って壊れないように。
      - uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          version: "~> v2"

      - name: wharfy を入れる
        run: |
          curl -fsSL https://github.com/ShiroDoromoto/wharfy/releases/latest/download/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: 配る物を焼く
        run: wharfy build

      # 署名は macOS の identity が要る。持っていないので飛ばす（wharfy は未署名を警告どまりで通す）。
      # 押さえている口（homebrew / scoop / apt / rpm）は、どれも署名を要求しない。

      - name: GitHub Release に上げる
        env:
          GITHUB_TOKEN: ${{ secrets.WHARFY_GITHUB_TOKEN }}
        run: wharfy release --yes

      - name: 各チャネルへ配る
        env:
          # tap / bucket は別リポジトリなので、Actions が渡す token では届かない。
          # wharfy がまだ無い tap を作るところまでやるため、repo スコープの PAT が要る。
          GITHUB_TOKEN: ${{ secrets.WHARFY_GITHUB_TOKEN }}
          PACKAGE_REPO_TOKEN: ${{ secrets.PACKAGE_REPO_TOKEN }}
        run: wharfy publish --yes

      # GitHub Action の使う側は `uses: ShiroDoromoto/esorp@v0` と書く。README に具体的な版を
      # 載せると、リリースのたびに README だけが古びる。配り終えてからメジャータグを動かす。
      - name: メジャータグを動かす
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          major="${GITHUB_REF_NAME%%.*}"
          git tag -f "$major" "$GITHUB_REF_NAME"
          git push -f origin "refs/tags/$major"

      # 配って終わりにしない。消費者の側から入れて、動くところまでを1周とする。
      # fury は取り込みに時間がかかるので、ここで落ちても配布が壊れたとは限らない。
      # 確かめ直すときは Verify ワークフロー（verify.yml）を単独で叩く。
      - name: 消費者側から入れて確かめる
        env:
          GITHUB_TOKEN: ${{ secrets.WHARFY_GITHUB_TOKEN }}
        run: wharfy verify --install
