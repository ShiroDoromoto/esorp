name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # 検査の中身は Makefile が持つ。手元で `make check` が緑なら、ここも緑になる。
      - name: gofmt
        run: make fmt

      - name: go vet
        run: make vet

      - name: go test
        run: make test

      # esorp を esorp 自身に当てる。ツリー全体を緑に保つ（抑制は持たない）。
      - name: esorp check（ドッグフーディング）
        run: make dogfood

      # 純 Go・cgo なし・単一バイナリを担保する（CI に置くバイナリが要件）。
      - name: クロスコンパイル
        env:
          CGO_ENABLED: "0"
        run: |
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            echo "==> $target"
            GOOS=${target%/*} GOARCH=${target#*/} go build -o /dev/null ./cmd/esorp
          done

  # ワークフローと action.yml の壊れは、目で見ても出てこない。action の metadata は
  # 走らせても黙って通り、Marketplace の見た目になって初めて分かる（branding.color の
  # 取りうる色は決まっている）。Go とは無関係なので別 job に置き、check の緑を待たせない。
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # ワークフロー3本と、uses: ./ から辿られる action.yml をまとめて見る。呼び方は手元と
      # 同じ（make actions）。run: の中身は shellcheck に掛かる（ubuntu-latest に入っている）。
      - name: actionlint
        run: make actions
